{% include 'partials/head.html' %}
<body>
    
    <main class="auth-page">

    <div class="auth-header">

        <div class="auth-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building2 w-6 h-6 text-white"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path><path d="M10 6h4"></path><path d="M10 10h4"></path><path d="M10 14h4"></path><path d="M10 18h4"></path></svg>
        </div>

        <h1>{{ title }}</h1>

        <p>
            {{ subtitle }}
        </p>

    </div>

    <div class="auth-card">

        <h2>{{ title }}</h2>

        <p class="auth-description">
            {{ card_description }}
        </p>

        <div class="auth-tabs">

            <button class="tab active">
                Entrar
            </button>

            <button class="tab">
                Criar Conta
            </button>

        </div>

        <form method="post">

            {% csrf_token %}

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    placeholder="seu@email.com"
                >

            </div>

            <div class="form-group">

                <label>Senha</label>

                <input
                    type="password"
                    placeholder="••••••••"
                >

            </div>

            <div class="remember-wrapper">

                <input
                    type="checkbox"
                    id="remember"
                >

                <label for="remember">
                    Lembrar-me neste dispositivo
                </label>

            </div>

            <button
                type="submit"
                class="auth-submit"
            >
                Entrar na Plataforma
            </button>

        </form>

    </div>

    <div class="auth-footer">

        <a href="/">
            Voltar para página inicial
        </a>

        <p>
            © 2024 MobFind. Todos os direitos reservados.
        </p>

    </div>

</main>

</body>
</html>
