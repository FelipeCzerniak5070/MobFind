<header>
    <div class="container">
        <div class="main-logo">
            <a href="/" class ="logo">
                <span class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building2 w-6 h-6 text-white"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path><path d="M10 6h4"></path><path d="M10 10h4"></path><path d="M10 14h4"></path><path d="M10 18h4"></path></svg>
                </span>
                <span class="title">MobFind</span>
            </a>
        </div>

    <div class="header-actions">

        {% if user.is_authenticated %}

            <span class="user-name">
                Olá, {{ user.username }}
            </span>

            <a href="{% url 'core:logout' %}" class="btn btn-outline">
                Sair
            </a>

        {% else %}

            <a href="{% url 'core:login' 'client' %}" class="btn btn-outline">
                Sou Cliente
            </a>

            <a href="{% url 'core:login' 'realtor' %}" class="btn btn-primary">
                Sou Imobiliária
            </a>

        {% endif %}

    </div>

    </div>
</header>
